<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div class="h-screen grid grid-cols-2 bg-gray-100 space-y-2 space-x-2">
        <div class="shadow-lg space-y-2">
            <div>
                <img src="./img/inclinbarb.gif" alt="">
            </div>
            <div class="bg-black text-white rounded">
                <h1 class="font-semibold text-lg text-center">Incline Barbell Press</h1>
            </div>
        </div>

        <div class="shadow-lg space-y-2">
            <div>
                <img src="./img/Dumbbell-Shoulder-Press.gif" alt="">
            </div>
            <div class="bg-black text-white rounded">
                <h1 class="font-semibold text-lg text-center capitalize">Dumbbell Shoulder press</h1>
            </div>
        </div>

        <div class="shadow-lg space-y-2">
            <div>
                <img src="./img/Arnold-Press (1).gif" alt="">
            </div>
            <div class="bg-black text-white rounded">
                <h1 class="font-semibold text-lg text-center capitalize">arnold press</h1>
            </div>
        </div>

        <div class="shadow-lg space-y-2">
            <div>
                <img src="./img/chestfly.gif" alt="">
            </div>
            <div class="bg-black text-white rounded">
                <h1 class="font-semibold text-lg text-center capitalize">cable chest fly</h1>
            </div>
        </div>

        <div class="shadow-lg space-y-2">
            <div>
                <img src="./img/Cable-Rope-Overhead-Triceps-Extension.gif" alt="">
            </div>
            <div class="bg-black text-white rounded">
                <h1 class="font-semibold text-lg text-center">overhead tricep extension</h1>
            </div>
        </div>

        <div class="shadow-lg space-y-2">
            <div>
                <img src="./img/barbell-close-grip-bench-press-exercise.gif" alt="">
            </div>
            <div class="bg-black text-white rounded">
                <h1 class="font-semibold text-lg text-center capitalize">assisted dips/close grip bench press</h1>
            </div>
        </div>

        <div class="shadow-lg space-y-2">
            <div>
                <img src="./img/TREADMIL.gif" alt="">
            </div>
            <div class="bg-black text-white rounded">
                <h1 class="font-semibold text-lg text-center">Cardio</h1>
            </div>
        </div>
    </div>
  </body>
</html>
